name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install Flutter dependencies
        run: |
          flutter pub get
          cd widgetbook && flutter pub get

      - name: Build Widgetbook
        run: |
          cd widgetbook
          flutter build web --release --no-tree-shake-icons --base-href /komponentbibliotek-flutter/widgetbook/

      - name: Verify Widgetbook build output
        run: |
          test -f widgetbook/build/web/index.html || (echo "Widgetbook build output not found" && exit 1)

      - name: Install VitePress dependencies
        run: cd site && npm ci

      - name: Build VitePress documentation
        run: cd site && npm run build

      - name: Copy Widgetbook into VitePress output
        run: cp -r widgetbook/build/web site/.vitepress/dist/widgetbook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
