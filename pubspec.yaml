name: designsystemet_flutter
description: Uoffisiell Flutter-implementasjon av Designsystemet (designsystemet.no) fra Digitaliseringsdirektoratet.
version: 0.2.0
publish_to: https://pub.dev
homepage: https://stigvaage.github.io/designsystemet-flutter/
repository: https://github.com/stigvaage/designsystemet-flutter
topics:
  - designsystemet
  - design-system
  - ui
  - widgets
  - accessibility

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  lucide_icons_flutter: ^3.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Inter
      fonts:
        - asset: lib/fonts/Inter-Regular.ttf
          weight: 400
        - asset: lib/fonts/Inter-Medium.ttf
          weight: 500
        - asset: lib/fonts/Inter-SemiBold.ttf
          weight: 600
